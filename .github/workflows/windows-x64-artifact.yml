name: Windows x64 Artifact

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows x64 release
        run: flutter build windows --release

      - name: Package Windows x64 bundle
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releaseDir)) {
            $releaseDir = "build\windows\runner\Release"
          }
          if (-not (Test-Path $releaseDir)) {
            throw "Windows release output directory was not found."
          }

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Compress-Archive `
            -Path "$releaseDir\*" `
            -DestinationPath "dist\morebettergakujo-windows-x64.zip" `
            -Force

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: morebettergakujo-windows-x64
          path: dist/morebettergakujo-windows-x64.zip
          if-no-files-found: error
