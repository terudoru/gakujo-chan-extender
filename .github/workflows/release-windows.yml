name: Release Windows x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows x64 release
        run: flutter build windows --release

      - name: Package Windows x64 bundle
        shell: pwsh
        run: |
          $tagName = "${{ inputs.tag_name || github.ref_name }}"
          $safeTagName = $tagName -replace '[^A-Za-z0-9._-]', '-'
          $releaseDir = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releaseDir)) {
            $releaseDir = "build\windows\runner\Release"
          }
          if (-not (Test-Path $releaseDir)) {
            throw "Windows release output directory was not found."
          }

          $artifactDir = "dist"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $zipPath = "$artifactDir\morebettergakujo-windows-x64-$safeTagName.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipPath -Force
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: ${{ steps.package.outputs.zip_path }}
          body: |
            Windows x64 build for More Better Gakujo.

            Notes:
            - Unzip the archive and run `morebettergakujo_flutter.exe`.
            - Microsoft Edge WebView2 Runtime is required. It is usually already installed on Windows 11.
