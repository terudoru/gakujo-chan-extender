name: Release iOS Sideload IPA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.66.0"
        required: true
        type: string
      release_notes:
        description: "Release notes shown in the SideStore source"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios-sideload:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Package unsigned iOS IPA
        run: ./scripts/package_ios_ipa.sh

      - name: Generate SideStore source
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
          RELEASE_NOTES: ${{ inputs.release_notes || 'iOS/iPadOS self-signed build.' }}
          OUTPUT_PATH: dist/altstore-source.json
        run: ./scripts/generate_altstore_source.sh dist/morebettergakujo-ios.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            dist/morebettergakujo-ios.ipa
            dist/altstore-source.json
          body: |
            iOS/iPadOS self-signed build for More Better Gakujo.

            Notes:
            - This is not an App Store build.
            - Use Sideloadly on Mac/PC, or SideStore for technical users who have completed SideStore setup.
            - Free Apple Accounts usually require refreshing before the 7-day expiry.
